<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏观情绪与估值监控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        .neon-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 p-6 font-sans min-h-screen">

    <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-2xl font-bold text-sky-400 neon-text">🌐 全景宏观情绪监控大屏</h1>
        <div class="text-sm text-slate-400" id="clock">数据同步中...</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col items-center justify-center">
            <h3 class="text-slate-300 font-semibold mb-2">CNN 恐慌与贪婪指数 (实时抓取)</h3>
            <div id="gauge-chart" style="width: 100%; height: 350px;"></div>
            <p id="fg-status" class="text-xl font-bold mt-2 text-slate-500">连接 API 中...</p>
        </div>

        <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>
                <h3 class="text-slate-400 text-sm">席勒 CAPE (周期调整市盈率)</h3>
                <p class="text-3xl font-bold text-white mt-2">34.2 <span class="text-sm font-normal text-slate-500">/ 均值 17</span></p>
                <p class="text-yellow-500 text-xs mt-2">▶ 状态：历史高位区间 (待接入数据)</p>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-sky-500"></div>
                <h3 class="text-slate-400 text-sm">AAII 散户牛熊差值</h3>
                <p class="text-3xl font-bold text-white mt-2">+15.4%</p>
                <p class="text-sky-400 text-xs mt-2">▶ 状态：乐观情绪蔓延 (待接入数据)</p>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-rose-500"></div>
                <h3 class="text-slate-400 text-sm">NAAIM 经理人持仓指数</h3>
                <p class="text-3xl font-bold text-white mt-2">82.5</p>
                <p class="text-rose-400 text-xs mt-2">▶ 状态：机构高仓位运行 (待接入数据)</p>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                <h3 class="text-slate-400 text-sm">S&P 500 站上 50 日均线比例</h3>
                <p class="text-3xl font-bold text-white mt-2">68.0%</p>
                <p class="text-emerald-400 text-xs mt-2">▶ 状态：市场宽度健康 (待接入数据)</p>
            </div>

        </div>
    </div>

    <script>
        // 1. 初始化 ECharts 仪表盘
        const gaugeDom = document.getElementById('gauge-chart');
        const myChart = echarts.init(gaugeDom, 'dark', { backgroundColor: 'transparent' });
        
        const option = {
            series: [{
                type: 'gauge',
                startAngle: 180,
                endAngle: 0,
                min: 0,
                max: 100,
                splitNumber: 4,
                axisLine: {
                    lineStyle: {
                        width: 24,
                        color: [
                            [0.25, '#fb7185'], // 极度恐慌 (红)
                            [0.45, '#fbbf24'], // 恐慌 (黄)
                            [0.55, '#94a3b8'], // 中性 (灰)
                            [0.75, '#34d399'], // 贪婪 (浅绿)
                            [1, '#10b981']     // 极度贪婪 (深绿)
                        ]
                    }
                },
                pointer: {
                    icon: 'path://M12.8,0.7l12,40.1H0.7L12.8,0.7z',
                    length: '12%',
                    width: 20,
                    offsetCenter: [0, '-60%'],
                    itemStyle: { color: '#e2e8f0' }
                },
                axisTick: { length: 12, lineStyle: { color: 'auto', width: 2 } },
                splitLine: { length: 20, lineStyle: { color: 'auto', width: 5 } },
                axisLabel: { color: '#94a3b8', distance: -60, fontSize: 14 },
                title: { offsetCenter: [0, '-20%'], fontSize: 16 },
                detail: {
                    fontSize: 40,
                    offsetCenter: [0, '20%'],
                    valueAnimation: true,
                    color: '#f8fafc',
                    formatter: '{value}'
                },
                data: [{ value: 50, name: '计算中...' }] // 初始假数据
            }]
        };
        myChart.setOption(option);

        // 2. 核心逻辑：获取 API 数据并驱动仪表盘
        async function fetchSentimentData() {
            try {
                // 呼叫你的 Vercel API
                const response = await fetch('/api/sentiment');
                const data = await response.json();
                
                // 驱动 ECharts 指针偏转到真实分数
                myChart.setOption({
                    series: [{
                        data: [{ value: data.score, name: 'Score' }]
                    }]
                });

                // 更新下方的文字状态
                const statusEl = document.getElementById('fg-status');
                statusEl.innerText = `当前市场定性：${data.rating}`;
                
                // 根据分数改变文字颜色
                if(data.score <= 25) statusEl.className = "text-xl font-bold mt-2 text-rose-500";
                else if(data.score <= 45) statusEl.className = "text-xl font-bold mt-2 text-yellow-500";
                else if(data.score <= 55) statusEl.className = "text-xl font-bold mt-2 text-slate-400";
                else statusEl.className = "text-xl font-bold mt-2 text-emerald-500";

                document.getElementById('clock').innerText = `最后更新: ${new Date(data.timestamp).toLocaleTimeString()}`;

            } catch (error) {
                console.error("数据拉取失败:", error);
                document.getElementById('fg-status').innerText = "数据获取失败，请重试";
            }
        }

        // 页面加载完成后立即抓取
        fetchSentimentData();
        // 自动适应屏幕缩放
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
